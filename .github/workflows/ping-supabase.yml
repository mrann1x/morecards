name: Ping Supabase to Prevent Pausing

on:
  schedule:
    # Runs every day at 9:00 AM UTC
    - cron: '0 9 * * *'

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase client
        run: npm install @supabase/supabase-js

      - name: Query Supabase databases
        env:
          SUPABASE_CONFIGS: ${{ secrets.SUPABASE_CONFIGS }}
        run: |
          node <<'EOF'
          const { createClient } = require('@supabase/supabase-js');

          async function main() {
            if (!process.env.SUPABASE_CONFIGS) {
              throw new Error(
                'Missing SUPABASE_CONFIGS secret in GitHub repository settings.'
              );
            }

            let configs;

            try {
              configs = JSON.parse(process.env.SUPABASE_CONFIGS);
            } catch {
              throw new Error('SUPABASE_CONFIGS does not contain valid JSON.');
            }

            if (!Array.isArray(configs) || configs.length === 0) {
              throw new Error(
                'SUPABASE_CONFIGS must be a non-empty JSON array.'
              );
            }

            console.log(`Checking ${configs.length} Supabase project(s)...`);
            console.log(`Timestamp: ${new Date().toISOString()}`);
            console.log('-'.repeat(60));

            let successCount = 0;
            let failCount = 0;

            for (let index = 0; index < configs.length; index++) {
              const config = configs[index];
              const databaseName = config.name || `Database ${index + 1}`;
              const tableName = config.table || 'keep_alive';

              console.log(
                `\n[${index + 1}/${configs.length}] ${databaseName}`
              );

              try {
                if (!config.url || !config.key) {
                  throw new Error('Missing url or key.');
                }

                const supabase = createClient(config.url, config.key, {
                  auth: {
                    persistSession: false,
                    autoRefreshToken: false
                  }
                });

                const startTime = Date.now();

                const { data, error } = await supabase
                  .from(tableName)
                  .select('*')
                  .limit(1);

                if (error) {
                  throw new Error(
                    `Query of table "${tableName}" failed: ${error.message}`
                  );
                }

                const duration = Date.now() - startTime;

                console.log(`Table: ${tableName}`);
                console.log(`Rows returned: ${data?.length ?? 0}`);
                console.log(`Success: ${duration} ms`);

                successCount++;
              } catch (error) {
                console.error(`Failed: ${error.message}`);
                failCount++;
              }
            }

            console.log('\n' + '-'.repeat(60));
            console.log(`Successful: ${successCount}`);
            console.log(`Failed: ${failCount}`);
            console.log(`Total: ${configs.length}`);

            if (failCount > 0) {
              process.exitCode = 1;
              return;
            }

            console.log('\nAll Supabase projects queried successfully.');
          }

          main().catch(error => {
            console.error(`Fatal error: ${error.message}`);
            process.exit(1);
          });
          EOF
